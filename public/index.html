<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="description" content="JarvisAgent - AI 协同办公助手，支持 IM、文档、演示稿智能生成" />
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="apple-touch-icon" href="/static/icon-192.svg" />
    <title>JarvisAgent | AI 协同办公</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <!-- Auth Page -->
    <div id="auth-page" class="auth-page">
      <div class="auth-card">
        <h1>🤖 JarvisAgent</h1>
        <p>AI 协同办公助手</p>
        <div id="auth-form-login">
          <div class="form-group">
            <label>用户名</label>
            <input id="login-username" type="text" placeholder="输入用户名" />
          </div>
          <div class="form-group">
            <label>密码</label>
            <input id="login-password" type="password" placeholder="输入密码" />
          </div>
          <button class="btn-primary" onclick="doLogin()">登录</button>
          <div class="auth-switch">没有账号？<a onclick="showRegister()">注册新账号</a></div>
          <div id="login-error" class="auth-error"></div>
        </div>
        <div id="auth-form-register" style="display:none;">
          <div class="form-group">
            <label>用户名</label>
            <input id="reg-username" type="text" placeholder="输入用户名（登录ID）" />
          </div>
          <div class="form-group">
            <label>显示名称</label>
            <input id="reg-name" type="text" placeholder="你的显示名称" />
          </div>
          <div class="form-group">
            <label>密码</label>
            <input id="reg-password" type="password" placeholder="设置密码（至少4位）" />
          </div>
          <button class="btn-primary" onclick="doRegister()">注册</button>
          <div class="auth-switch">已有账号？<a onclick="showLogin()">去登录</a></div>
          <div id="reg-error" class="auth-error"></div>
        </div>
      </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="main-app" class="app" style="display:none;">
      <!-- Navigation -->
      <nav class="nav-bar">
        <div class="nav-brand">🤖 JarvisAgent</div>
        <div class="nav-tabs">
          <button class="nav-tab active" data-view="im">💬 IM</button>
          <button class="nav-tab" data-view="documents">📄 文档</button>
          <button class="nav-tab" data-view="slides">📊 演示稿</button>
          <button class="nav-tab" data-view="friends">👥 好友</button>
        </div>
        <div class="nav-user">
          <span class="user-name" id="nav-username"></span>
          <button class="btn-sm btn-danger" onclick="doLogout()">退出</button>
        </div>
      </nav>

      <!-- IM View -->
      <div id="view-im" class="view active">
        <aside class="sidebar">
          <div class="sidebar-top">
            <input id="conversation-search" type="search" placeholder="搜索会话" />
          </div>
          <div id="conversation-list" class="conversation-list"></div>
        </aside>

        <main class="chat-panel">
          <header class="chat-header">
            <div id="chat-avatar" class="avatar"></div>
            <div>
              <h2 id="chat-title">选择一个会话</h2>
              <p id="chat-subtitle" class="hint"></p>
            </div>
          </header>

          <section id="message-list" class="message-list">
            <div class="empty-state">选择左侧会话开始聊天</div>
          </section>

          <form id="composer" class="composer">
            <button type="button" id="voice-btn" class="voice-btn" title="语音输入">🎤</button>
            <textarea id="message-input" rows="2" placeholder="输入消息... (输入指令如「帮我写一份产品方案」触发 Agent)"></textarea>
            <button id="send-button" type="submit">发送</button>
          </form>
        </main>
      </div>

      <!-- Documents View -->
      <div id="view-documents" class="view">
        <aside class="sidebar">
          <div class="sidebar-top">
            <h3>📄 文档列表</h3>
          </div>
          <div id="document-list" class="document-list"></div>
        </aside>
        <main class="doc-panel">
          <div id="doc-content" class="doc-content">
            <div class="empty-state">选择左侧文档查看内容，或在 IM 中让 Agent 生成新文档</div>
          </div>
        </main>
      </div>

      <!-- Slides View -->
      <div id="view-slides" class="view">
        <aside class="sidebar">
          <div class="sidebar-top">
            <h3>📊 演示稿列表</h3>
          </div>
          <div id="slides-list" class="slides-list"></div>
        </aside>
        <main class="slides-panel">
          <div id="slides-content" class="slides-content">
            <div class="empty-state">选择左侧演示稿查看，或在 IM 中让 Agent 生成</div>
          </div>
        </main>
      </div>

      <!-- Friends View -->
      <div id="view-friends" class="view">
        <aside class="sidebar">
          <div class="sidebar-top">
            <h3>👥 好友列表</h3>
          </div>
          <div id="friends-list" class="friends-list"></div>
        </aside>
        <main class="friends-panel">
          <div class="friends-section">
            <h3>添加好友</h3>
            <div class="add-friend-form">
              <input id="add-friend-input" type="text" placeholder="输入用户名搜索" />
              <button onclick="searchAndAddFriend()">搜索</button>
            </div>
            <div id="search-results"></div>
          </div>
          <div class="friends-section">
            <h3>好友请求</h3>
            <div id="friend-requests"></div>
          </div>
        </main>
      </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
